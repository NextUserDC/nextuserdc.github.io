      <section class="contact-section">
        <h2>📬 Contáctame</h2>
        <p>¿Tienes dudas o sugerencias? Envíame un correo.</p>
        <form action="https://formspree.io/f/maqkqjpo" method="POST" class="contact-form" aria-label="Formulario de contacto">
          <div class="form-group">
            <label for="contact-name" class="sr-only">Tu nombre</label>
            <input type="text" id="contact-name" name="Nombre" placeholder="Tu nombre" required>
          </div>
          <div class="form-group">
            <label for="contact-email" class="sr-only">Tu email</label>
            <input type="email" id="contact-email" name="Email" placeholder="Tu email" required>
          </div>
          <div class="form-group">
            <label for="contact-message" class="sr-only">Tu mensaje</label>
            <textarea id="contact-message" name="Mensaje" placeholder="Tu mensaje" rows="4" required></textarea>
          </div>
          <button type="submit" class="submit-btn">Enviar Mensaje</button>
        </form>
      </section>
    </main>
  </div>
  <script>
  function toggleDropdown(e, id) {
    e.preventDefault();
    e.stopPropagation();
    var menu = document.getElementById(id);
    var btn = menu.previousElementSibling;
    var isOpen = menu.classList.toggle('show');
    btn.setAttribute('aria-expanded', isOpen);
  }
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.dropdown-wrapper')) {
      document.querySelectorAll('.dropdown-menu.show').forEach(function(d) {
        d.classList.remove('show');
        d.previousElementSibling.setAttribute('aria-expanded', 'false');
      });
    }
  });
  </script>
