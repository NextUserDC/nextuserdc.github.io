<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Cuerpo del pendrive -->
  <rect x="4" y="18" width="40" height="28" rx="4"/>
  <!-- Conector USB metalico -->
  <rect x="44" y="22" width="14" height="20" rx="1"/>
  <!-- Interior del conector (ranura) -->
  <rect x="47" y="26" width="8" height="12" rx="0.5"/>
  <!-- Linea interna del conector -->
  <line x1="47" y1="32" x2="55" y2="32"/>
  <!-- LED indicator -->
  <circle cx="12" cy="32" r="2.5" fill="white"/>
  <!-- Aro para llavero -->
  <circle cx="8" cy="32" r="5"/>
</svg>
